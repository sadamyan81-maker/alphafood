<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HoReCa Interactive Catalogue</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a class="brand-link" href="https://foodservice.am/" target="_blank" rel="noopener noreferrer" aria-label="Alpha Food Service">
      <img class="brand-logo" src="assets/foodservice-logo.svg" alt="Alpha Food Service" />
    </a>
    <small>Interactive HoReCa Catalogue</small>
  </div>
  <div class="actions">
    <button id="clientBtn">Клиент</button>
    <button id="reportBtn">Итог встречи <b id="selectedCount">0</b></button>
    <button id="clearBtn" class="danger">Очистить</button>
  </div>
</header>

<aside class="sidebar">
  <input id="search" placeholder="Поиск товара, бренда, категории..." />
  <select id="categoryFilter"><option value="">Все категории</option></select>
  <div id="pageList" class="page-list"></div>
</aside>

<main class="viewer">
  <div id="book" class="book is-closed">
    <button id="bookCover" class="book-cover" type="button" aria-label="Открыть каталог">
      <img src="images/pages/page-01.jpg" alt="Обложка каталога" />
      <span>Нажмите, чтобы открыть каталог</span>
    </button>

    <div id="bookSpread" class="book-spread">
      <button id="prevPage" class="page-arrow prev" type="button" aria-label="Предыдущая страница">‹</button>
      <div id="pages" class="pages" aria-live="polite"></div>
      <button id="nextPage" class="page-arrow next" type="button" aria-label="Следующая страница">›</button>
    </div>

    <div class="book-controls">
      <button id="closeBook" class="book-close" type="button">Закрыть книгу</button>
      <span id="pageIndicator" class="page-indicator"></span>
    </div>
  </div>
</main>

<div id="productModal" class="modal hidden">
  <div class="modal-card">
    <button class="x" data-close="productModal">×</button>
    <h2 id="mTitle"></h2>
    <div class="meta" id="mMeta"></div>
    <label class="check"><input type="checkbox" id="mOrder" /> Заказать</label>
    <label class="check"><input type="checkbox" id="mSample" /> Запросить образец для тестирования</label>
    <label class="check"><input type="checkbox" id="mSpecial" /> Запросить специальное условие</label>
    <div id="mQuantityWrap" class="quantity-field hidden">
      <strong>Выберите объём и количество</strong>
      <div id="mOrderVariants" class="order-variants"></div>
      <small>Можно заказать несколько вариантов одновременно.</small>
    </div>
    <label>Комментарий менеджера<textarea id="mComment" rows="4" placeholder="Например: нужны специальные условия, отправить образец, возможен регулярный заказ..."></textarea></label>
    <div class="modal-actions">
      <button id="saveProduct" class="primary">Сохранить</button>
      <button id="removeProduct" class="danger secondary">Удалить из выбранных</button>
    </div>
  </div>
</div>

<div id="clientModal" class="modal hidden">
  <div class="modal-card wide">
    <button class="x" data-close="clientModal">×</button>
    <h2>Карточка клиента</h2>
    <div class="form-grid">
      <input id="cCompany" placeholder="Компания *" autocomplete="organization" required />
      <input id="cPerson" placeholder="Контактное лицо *" autocomplete="name" required />
      <input id="cPhone" type="tel" inputmode="numeric" placeholder="+374 XX XXX XXX *" autocomplete="tel" maxlength="15" pattern="\+374 [0-9]{2} [0-9]{3} [0-9]{3}" title="Введите номер в формате +374 XX XXX XXX" required />
      <input id="cEmail" type="email" placeholder="E-mail *" autocomplete="email" required />
      <select id="cType"><option>Ресторан</option><option>Кафе</option><option>Гостиница</option><option>Кейтеринг</option><option>Магазин</option><option>Дистрибьютор</option><option>Другое</option></select>
      <input id="cManager" placeholder="Менеджер" />
      <input id="cDate" type="date" />
      <input id="cAddress" placeholder="Юридический адрес" autocomplete="street-address" />
      <input id="cDeliveryAddress" class="full-row" placeholder="Адрес доставки" autocomplete="shipping street-address" />
    </div>
    <textarea id="cComment" rows="3" placeholder="Общий комментарий по встрече"></textarea>
    <button id="saveClient" class="primary">Сохранить клиента</button>
  </div>
</div>

<div id="reportModal" class="modal hidden">
  <div class="modal-card report-card">
    <button class="x" data-close="reportModal">×</button>
    <h2>Итог встречи</h2>
    <div id="reportSummary" class="summary"></div>
    <div class="table-wrap"><table id="reportTable"></table></div>
    <div class="modal-actions">
      <button id="downloadPdf" class="primary">Скачать отчет PDF</button>
      <button id="downloadExcel" class="excel">Скачать отчет Excel</button>
      <button id="sendWhatsapp" class="whatsapp">Отправить по WhatsApp</button>
      <button id="sendTelegram" class="telegram">Отправить по Telegram</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="assets/fonts/font-data.js"></script>
<script src="assets/pdf-logo-data.js"></script>
<script src="script.js"></script>
</body>
</html>
